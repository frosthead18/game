<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Sign In</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          <mat-error>
            {{ form.get('email')?.hasError('required') ? 'Email is required' : 'Enter a valid email' }}
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          <mat-error>
            {{ form.get('password')?.hasError('required') ? 'Password is required' : 'At least 8 characters' }}
          </mat-error>
        </mat-form-field>

        <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button mat-raised-button color="primary" type="submit" [disabled]="loading" class="full-width submit-btn">
          {{ loading ? 'Signing in…' : 'Sign In' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a mat-button routerLink="/auth/register">Create account</a>
      <a mat-button routerLink="/auth/forgot-password">Forgot password?</a>
    </mat-card-actions>
  </mat-card>
</div>
