<div class="auth-container">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>Confirm Your Account</mat-card-title>
      <mat-card-subtitle *ngIf="email">A verification code was sent to {{ email }}</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="fill" class="full-width">
          <mat-label>Verification Code</mat-label>
          <input matInput formControlName="code" inputmode="numeric" maxlength="6" autocomplete="one-time-code" />
          <mat-error>
            {{ form.get('code')?.hasError('required') ? 'Code is required' : 'Enter the 6-digit code' }}
          </mat-error>
        </mat-form-field>

        <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button mat-raised-button color="primary" type="submit" [disabled]="loading" class="full-width submit-btn">
          {{ loading ? 'Confirming…' : 'Confirm Account' }}
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <a mat-button routerLink="/auth/login">Back to Sign In</a>
    </mat-card-actions>
  </mat-card>
</div>
