<mat-drawer-container class="app" autosize>
  <mat-drawer #drawer class="app__sidenav" mode="side">
    <p>Sidenav</p>
  </mat-drawer>

  <div class="app__sidenav-content">
    <main>
      <a [routerLink]="'game-page'">{{title}}</a>
      <button type="button" mat-button (click)="drawer.toggle()">
        Toggle sidenav
      </button>

      <router-outlet/>
    </main>
  </div>
</mat-drawer-container>
