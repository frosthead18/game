<div class="p-6">
  <h2 class="text-xl font-bold mb-4">Exit Game</h2>
  <p class="mb-6">
    Are you sure you want to exit the game?
  </p>
  <div class="flex justify-end gap-3">
    <button mat-button (click)="onContinue()">Continue</button>
    <button mat-raised-button color="warn" (click)="onExit()">Exit</button>
  </div>
</div>
